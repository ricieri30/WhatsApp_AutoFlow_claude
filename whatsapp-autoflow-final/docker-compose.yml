services:

  # ── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: autoflow2_mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - autoflow2-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autoflow2_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - autoflow2-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── WA Gateway (Baileys — QR Code real) ──────────────────────
  wa-gateway:
    build: ./wa-gateway
    container_name: autoflow2_gateway
    environment:
      - NODE_ENV=production
      - PORT=3333
      - WEBHOOK_URL=http://api:3000/api/internal/message
      - TZ=America/Sao_Paulo
    volumes:
      - wa_auth:/app/auth
    restart: unless-stopped
    networks:
      - autoflow2-net

  # ── API (Express + JWT + MongoDB) ─────────────────────────────
  api:
    build: ./api
    container_name: autoflow2_api
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URL=mongodb://mongo:27017/wa_admin
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-autoflow2-jwt-secret}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@admin.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin#123456}
      - WA_GATEWAY_URL=http://wa-gateway:3333
      - TZ=America/Sao_Paulo
      - NOTICE_7D=${NOTICE_7D:-Olá {{nome}}! Sua assinatura vence em 7 dias.}
      - NOTICE_1D=${NOTICE_1D:-Atenção {{nome}}! Sua assinatura vence amanhã.}
      - NOTICE_TODAY=${NOTICE_TODAY:-Olá {{nome}}! Sua assinatura expira hoje.}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - autoflow2-net

  # ── Worker (BullMQ) ───────────────────────────────────────────
  worker:
    build: ./worker
    container_name: autoflow2_worker
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/wa_admin
      - REDIS_HOST=redis
      - WA_GATEWAY_URL=http://wa-gateway:3333
      - MIN_MESSAGE_DELAY_MS=${MIN_MESSAGE_DELAY_MS:-2000}
      - JITTER_MS=${JITTER_MS:-1000}
      - TZ=America/Sao_Paulo
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - autoflow2-net

  # ── Frontend ──────────────────────────────────────────────────
  web:
    build: ./web
    container_name: autoflow2_web
    ports:
      - "3025:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - autoflow2-net

networks:
  autoflow2-net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  wa_auth:
